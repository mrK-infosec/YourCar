version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: revora-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: revora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: revora-meilisearch
    environment:
      MEILI_MASTER_KEY: 'masterKey123!'
      MEILI_ENV: 'development'
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  meilisearch_data:
